<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunfetti - Original Concept by Roxana Refetova</title>
    <style>
        /* Base Styling & Theme (Pinks, Whites, & Sprinkles) */
        :root {
            --bg-color: #FFF0F5; /* Soft Lavender Blush Pink */
            --card-color: #FFFFFF;
            --text-color: #5D4037;
            --accent-pink: #FFB6C1; /* Light Pink */
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: space-between;
            transition: background 1s ease, color 1s ease;
            overflow-x: hidden;
            /* Sprinkle Background Effect */
            background-image: 
                radial-gradient(circle at 20% 30%, #FFD700 2px, transparent 3px),
                radial-gradient(circle at 75% 15%, #FF69B4 2px, transparent 3px),
                radial-gradient(circle at 40% 80%, #87CEEB 2px, transparent 3px),
                radial-gradient(circle at 85% 70%, #98FB98 2px, transparent 3px);
            background-size: 200px 200px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Top Audio Control */
        .audio-control {
            align-self: flex-end;
            margin: 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid var(--accent-pink);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .audio-control:hover {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* Main App Card Container */
        .app-container {
            background: var(--card-color);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            text-align: center;
            border: 4px solid var(--accent-pink);
            transition: all 1s ease;
        }

        /* Elements Styling */
        .sun-icon {
            font-size: 65px;
            margin-bottom: 10px;
            animation: bounce 3s infinite ease-in-out;
            display: inline-block;
        }

        h1 {
            font-size: 28px;
            color: #FF69B4;
            margin-top: 0;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid var(--accent-pink);
            border-radius: 25px;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            color: #5D4037;
            transition: box-shadow 0.3s ease;
        }

        .search-box:focus {
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
            border-color: #FF69B4;
        }

        /* Screen Display Management */
        #hold-screen, #result-screen {
            display: none;
        }

        .hold-btn {
            font-size: 70px;
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.2s;
            padding: 20px;
            display: inline-block;
        }

        .hold-btn:active {
            transform: scale(0.9);
        }

        .hold-instruction {
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-color);
            font-weight: 500;
        }

        .progress-bar-container {
            width: 100%;
            background: #eee;
            height: 10px;
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FF69B4);
            transition: width 0.1s linear;
        }

        /* Affirmation Text Styling */
        .affirmation-text {
            font-size: 18px;
            line-height: 1.8;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            animation: floatUp 1.5s forwards ease-out;
            max-height: 400px;
            overflow-y: auto;
            padding: 0 10px;
            margin-bottom: 20px;
        }

        .affirmation-text::-webkit-scrollbar {
            width: 6px;
        }

        .affirmation-text::-webkit-scrollbar-track {
            background: transparent;
        }

        .affirmation-text::-webkit-scrollbar-thumb {
            background: rgba(255, 182, 193, 0.5);
            border-radius: 3px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .back-btn, .copy-btn {
            padding: 12px 20px;
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .back-btn:hover, .copy-btn:hover {
            background: #FF69B4;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
        }

        .back-btn:active, .copy-btn:active {
            transform: translateY(0);
        }

        /* Roxana's Signature Footer */
        .signature-footer {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.9);
            border-top: 3px dashed var(--accent-pink);
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            margin-top: 40px;
            border-radius: 20px 20px 0 0;
        }

        .footer-quote {
            font-size: 15px;
            font-weight: bold;
            color: #FF69B4;
            margin-bottom: 5px;
            line-height: 1.6;
        }

        .footer-credit {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #8B7880;
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes floatUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
